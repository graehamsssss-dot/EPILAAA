<div class="page">
  <div class="panel">
    <div class="panel-header">
      <h2>Service Schedule</h2>
      <span>Add and manage clinic services</span>
    </div>

    <div class="form-grid">
      <input [(ngModel)]="form.name" type="text" placeholder="Service name">
      <select [(ngModel)]="form.category">
        <option>vaccination</option>
        <option>dental care</option>
        <option>maternal</option>
        <option>std test</option>
        <option>animal related / anti-rabies</option>
        <option>laboratory tests</option>
        <option>general check up</option>
        <option>other</option>
      </select>
      <input [(ngModel)]="form.days" type="text" placeholder="Available days">
      <input [(ngModel)]="form.startTime" type="time">
      <input [(ngModel)]="form.endTime" type="time">
      <input [(ngModel)]="form.slots" type="number" placeholder="Slot limit">
      <textarea [(ngModel)]="form.description" placeholder="Description"></textarea>
    </div>

    <button class="primary-btn" type="button" (click)="addService()">Add Service</button>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h3>Available Services</h3>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Service</th>
            <th>Category</th>
            <th>Days</th>
            <th>Time</th>
            <th>Slots</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of services">
            <td>
              <strong>{{ item.name }}</strong>
              <div class="muted">{{ item.description }}</div>
            </td>
            <td>{{ item.category }}</td>
            <td>{{ item.days }}</td>
            <td>{{ item.time }}</td>
            <td>{{ item.slots }}</td>
            <td>
              <span class="badge" [class.inactive]="item.status === 'Inactive'">{{ item.status }}</span>
            </td>
            <td>
              <button class="secondary-btn" type="button" (click)="toggleStatus(item)">Toggle</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
