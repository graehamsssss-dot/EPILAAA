<div class="settings-page">
  <section class="panel">
    <div class="panel-header">
      <h2>Admin Settings</h2>
      <p>Manage admin profile, password, and notification preferences.</p>
    </div>

    <div class="success-panel" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="error-panel" *ngIf="errorMessage">{{ errorMessage }}</div>
  </section>

  <section class="settings-grid">
    <div class="panel">
      <div class="panel-header">
        <h3>Profile</h3>
        <p>Basic admin account information.</p>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="profileForm.fullName" />
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" [(ngModel)]="profileForm.email" />
        </div>

        <div class="field full-width">
          <label>Contact Number</label>
          <input type="text" [(ngModel)]="profileForm.contactNumber" />
        </div>
      </div>

      <div class="form-actions">
        <button class="primary-btn" (click)="saveProfile()">Save Profile</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h3>Notifications</h3>
        <p>Choose which admin alerts stay enabled.</p>
      </div>

      <div class="toggle-list">
        <label class="toggle-row">
          <span>General Notifications</span>
          <input type="checkbox" [(ngModel)]="preferences.notifications" />
        </label>

        <label class="toggle-row">
          <span>Report Alerts</span>
          <input type="checkbox" [(ngModel)]="preferences.reportAlerts" />
        </label>

        <label class="toggle-row">
          <span>Queue Alerts</span>
          <input type="checkbox" [(ngModel)]="preferences.queueAlerts" />
        </label>

        <label class="toggle-row">
          <span>Inventory Alerts</span>
          <input type="checkbox" [(ngModel)]="preferences.inventoryAlerts" />
        </label>
      </div>

      <div class="form-actions">
        <button class="primary-btn" (click)="savePreferences()">Save Preferences</button>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <h3>Change Password</h3>
      <p>Update the admin account password securely.</p>
    </div>

    <div class="form-grid">
      <div class="field full-width">
        <label>Current Password</label>
        <input type="password" [(ngModel)]="passwordForm.currentPassword" />
      </div>

      <div class="field">
        <label>New Password</label>
        <input type="password" [(ngModel)]="passwordForm.newPassword" />
      </div>

      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" [(ngModel)]="passwordForm.confirmPassword" />
      </div>
    </div>

    <div class="form-actions">
      <button class="primary-btn" (click)="updatePassword()">Update Password</button>
    </div>
  </section>
</div>
