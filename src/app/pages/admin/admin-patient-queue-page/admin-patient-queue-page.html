<div class="queue-page">
  <section class="panel">
    <div class="panel-header">
      <h2>Patient Queue</h2>
      <p>Manage patient flow and update queue statuses.</p>
    </div>

    <div class="feedback error-panel" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="filter-grid">
      <div class="field">
        <label>Search</label>
        <input type="text" [(ngModel)]="searchTerm" placeholder="Search patient or service" />
      </div>

      <div class="field">
        <label>Date</label>
        <input type="date" [(ngModel)]="selectedDate" />
      </div>

      <div class="field">
        <label>Service</label>
        <input type="text" [(ngModel)]="selectedService" placeholder="Service name" />
      </div>

      <div class="field button-field">
        <button class="primary-btn" (click)="loadQueue()">Apply</button>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Queue No.</th>
            <th>Patient</th>
            <th>Service</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of filteredQueue">
            <td>{{ item.queue_number || '—' }}</td>
            <td>{{ item.patient_name }}</td>
            <td>{{ item.service_name }}</td>
            <td>{{ item.booking_date }}</td>
            <td>{{ item.booking_time }}</td>
            <td>
              <span class="status-badge" [ngClass]="getStatusClass(item.status)">
                {{ item.status }}
              </span>
            </td>
            <td>
              <div class="action-buttons">
                <button class="table-btn progress" (click)="updateStatus(item.id, 'In Progress')">In Progress</button>
                <button class="table-btn complete" (click)="updateStatus(item.id, 'Completed')">Complete</button>
                <button class="table-btn skip" (click)="updateStatus(item.id, 'No Show')">Skip</button>
                <button class="table-btn cancel" (click)="updateStatus(item.id, 'Cancelled')">Cancel</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
