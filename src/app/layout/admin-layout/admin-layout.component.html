<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-main">
        <img src="/logo.png" alt="ePILA Logo" class="brand-logo" />
        <div class="brand-text-wrap">
          <h2 class="brand-name">ePILA</h2>
          <p class="brand-subtitle">Admin Portal</p>
        </div>
      </div>
    </div>

    <nav class="nav-list">
      <a
        *ngFor="let item of adminNavItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        class="nav-link"
      >
        <span class="nav-dot"></span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" type="button" (click)="logout()">Logout</button>
    </div>
  </aside>

  <section class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Admin Portal</h1>
        <p>Manage services, queue, inventory, reports, and settings.</p>
      </div>
    </header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
